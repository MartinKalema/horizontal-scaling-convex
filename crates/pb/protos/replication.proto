syntax = "proto3";

package replication;

import "convex_identity.proto";

// Service for forwarding mutations from Replica nodes to the Primary.
// Replicas call ForwardMutation when they receive a mutation request
// from a client, and the Primary executes it locally.
service MutationForwarder {
  rpc ForwardMutation(ForwardMutationRequest) returns (ForwardMutationResponse);
}

message ForwardMutationRequest {
  // The function path to execute (e.g., "messages:send").
  string path = 1;

  // Serialized function arguments as a JSON array string.
  string args = 2;

  // The authenticated identity of the caller.
  convex_identity.UncheckedIdentity identity = 3;

  // Caller type for logging and rate limiting.
  string caller = 4;

  // Optional mutation identifier for idempotency.
  // If set, the Primary will return the cached result if this mutation
  // was already committed.
  optional bytes mutation_identifier = 5;

  // Optional hint about the mutation queue length on the Replica.
  optional uint64 mutation_queue_length = 6;
}

message ForwardMutationResponse {
  oneof result {
    MutationSuccess success = 1;
    MutationError error = 2;
  }
}

message MutationSuccess {
  // The return value as a JSON string.
  string value = 1;

  // Log lines captured during execution.
  repeated string log_lines = 2;

  // The commit timestamp.
  uint64 ts = 3;
}

message MutationError {
  // Error message from the mutation execution.
  string error_message = 1;

  // Optional structured error data as JSON.
  optional string error_data = 2;

  // Log lines captured during execution.
  repeated string log_lines = 3;
}

// Two-Phase Commit service for cross-partition writes (Vitess 2PC pattern).
// Each partitioned node runs this service. The coordinator sends Prepare
// to remote partitions, then CommitPrepared or RollbackPrepared.
service TwoPhaseCommitService {
  rpc Prepare(TwoPcPrepareRequest) returns (TwoPcPrepareResponse);
  rpc CommitPrepared(TwoPcCommitRequest) returns (TwoPcCommitResponse);
  rpc RollbackPrepared(TwoPcRollbackRequest) returns (TwoPcRollbackResponse);
}

message TwoPcPrepareRequest {
  // Globally unique 2PC transaction ID.
  string transaction_id = 1;

  // Serialized FinalTransaction (the partition's subset of writes).
  // Encoded as the full transaction — the receiving Committer validates
  // and stages only the writes for its partition.
  bytes serialized_transaction = 2;

  // Write source for logging.
  string write_source = 3;
}

message TwoPcPrepareResponse {
  // The prepare timestamp assigned by the participant's TSO.
  uint64 prepare_ts = 1;
}

message TwoPcCommitRequest {
  string transaction_id = 1;
}

message TwoPcCommitResponse {
  uint64 commit_ts = 1;
}

message TwoPcRollbackRequest {
  string transaction_id = 1;
}

message TwoPcRollbackResponse {
}

// Raft consensus transport service (tikv/raft-rs pattern).
// Each node in a Raft group runs this service. The leader sends
// AppendEntries and heartbeats; followers send RequestVote during elections.
// This replaces NATS for intra-partition replication.
service RaftTransportService {
  // Send a batch of Raft messages to a peer node.
  // Batching multiple messages per RPC reduces network overhead — this is
  // the same optimization TiKV uses with its Raft transport.
  rpc SendMessages(RaftMessageBatch) returns (RaftMessageResponse);
}

message RaftMessageBatch {
  // One or more Raft protocol messages (AppendEntries, Vote, Heartbeat, etc.)
  // Serialized as raft-rs protobuf Message.
  repeated bytes messages = 1;
}

message RaftMessageResponse {
}
