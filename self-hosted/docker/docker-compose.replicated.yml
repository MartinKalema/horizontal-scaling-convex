# Primary-Replica setup for horizontal scaling demo.
#
# Usage:
#   docker compose -f docker-compose.replicated.yml up
#
# Architecture:
#   - PostgreSQL: shared persistence layer
#   - NATS: distributed log (JetStream) for commit delta replication
#   - Primary: single writer, publishes deltas to NATS
#   - Replica: read-only, consumes deltas from NATS, serves queries
#
# This is a demonstration setup. In production you would run Primary and
# Replica(s) on separate machines, potentially with a load balancer routing
# mutations to Primary and queries to Replicas.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: convex_self_hosted
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      start_period: 10s

  nats:
    image: nats:alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # Monitoring
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      start_period: 5s
      retries: 3

  primary:
    image: convex-backend-replicated:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
      - "50051:50051"
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432
      - DO_NOT_REQUIRE_SSL=1
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - RUST_LOG=info
      - DISABLE_BEACON=true
      - INSTANCE_NAME=convex-primary
      - REPLICATION_MODE=primary
      - NATS_URL=nats://nats:4222
      - GRPC_PORT=50051
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  replica:
    image: convex-backend-replicated:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3220:3210"
      - "3221:3211"
    volumes:
      - replica-data:/convex/data
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432
      - DO_NOT_REQUIRE_SSL=1
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3220
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3221
      - RUST_LOG=info
      - DISABLE_BEACON=true
      - INSTANCE_NAME=convex-primary
      - REPLICATION_MODE=replica
      - NATS_URL=nats://nats:4222
      - PRIMARY_GRPC_URL=http://primary:50051
    depends_on:
      primary:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
    depends_on:
      primary:
        condition: service_healthy

volumes:
  pgdata:
  natsdata:
  replica-data:
